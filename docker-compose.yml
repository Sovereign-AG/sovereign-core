version: '3.8'

# Sovereign AG: Cloud-Native Architecture
# Scale-Ready: Kubernetes (K8s) or AWS ECS Compatibility
# Pillar Isolation: Distributed Identity & Audit

services:
  registry:
    build: .
    container_name: sovereign-registry-alpha
    restart: always
    ports:
      - "8000:8000"
    environment:
      - PRODUCTION=True
      - LOG_LEVEL=INFO
      - PYTHONUNBUFFERED=1
    volumes:
      # Persistent Storage: Ensure Identity & Audit Trails survive container restarts
      - ./keys:/app/keys
      - ./logs:/app/logs
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/.well-known/http-message-signatures-directory.json"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

networks:
  default:
    name: sovereign-net
